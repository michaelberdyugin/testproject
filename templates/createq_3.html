{% extends 'base.html' %}

{% block title %}
Создание вопроса
{% endblock %}

{% block menu %}
{% endblock %}

{% block main %}
<div class="container">
    <h2 class="text-center mb-4">Создание вопроса с ручным вводом ответа</h2>

    <form method="POST" class="mx-auto" style="max-width: 600px;">

        <!-- Вопрос -->
        <div class="mb-3">
            <label class="form-label">Текст вопроса:</label>
            <textarea name="test_question" class="form-control" rows="3"
                      placeholder="Введите текст вопроса" required></textarea>
        </div>

        <!-- Ответ -->
        <div class="mb-3">
            <label class="form-label">Правильный ответ:</label>
            <textarea name="test_answer" class="form-control" rows="2"
                      placeholder="Введите правильный ответ" required></textarea>
        </div>

        <p class="text-muted">Все введенные варианты ответа будут считаться правильными. Пользователь должен будет ввести один из них вручную.</p>

        <div class="text-center mt-4">
            <button type="submit" class="btn btn-primary btn-lg">Продолжить</button>
        </div>
    </form>
</div>
{% endblock %}

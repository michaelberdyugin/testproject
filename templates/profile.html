{% extends 'base.html' %}

{% block title %}Профиль{% endblock %}

{% block main %}
<div class="container mt-4" style="max-width: 560px;">
    <h2 class="mb-4">Профиль</h2>

    <div class="card">
        <div class="card-body">

            <!-- Имя -->
            <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                <div>
                    <div class="text-muted small">Имя пользователя</div>
                    <div class="fs-5">{{ current_user.username }}</div>
                </div>
                <button class="btn btn-link text-secondary p-1" data-bs-toggle="modal" data-bs-target="#usernameModal">
                    <i class="bi bi-pencil"></i>
                </button>
            </div>

            <!-- Почта -->
            <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                <div>
                    <div class="text-muted small">Email</div>
                    <div class="fs-5">{{ current_user.email }}</div>
                </div>
                <button class="btn btn-link text-secondary p-1" data-bs-toggle="modal" data-bs-target="#emailModal">
                    <i class="bi bi-pencil"></i>
                </button>
            </div>

            <!-- Пароль -->
            <div class="d-flex justify-content-between align-items-center py-2">
                <div>
                    <div class="text-muted small">Пароль</div>
                    <div class="fs-5">••••••••</div>
                </div>
                <button class="btn btn-link text-secondary p-1" data-bs-toggle="modal" data-bs-target="#passwordModal">
                    <span class="small">Сменить пароль</span>
                </button>
            </div>

        </div>
    </div>
</div>

<!-- Модалка: сменить имя -->
<div class="modal fade" id="usernameModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Сменить имя пользователя</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="/profile/update-username">
                <div class="modal-body">
                    <input type="text" class="form-control" name="username"
                           value="{{ current_user.username }}" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Модалка: сменить почту -->
<div class="modal fade" id="emailModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Сменить почту</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="/profile/update-email">
                <div class="modal-body">
                    <input type="email" class="form-control" name="email"
                           value="{{ current_user.email }}" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Модалка: сменить пароль -->
<div class="modal fade" id="passwordModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Сменить пароль</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="/profile/update-password">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Текущий пароль</label>
                        <input type="password" class="form-control" name="current_password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Новый пароль</label>
                        <input type="password" class="form-control" name="new_password" minlength="6" required>
                    </div>
                    <div class="mb-0">
                        <label class="form-label">Повторите новый пароль</label>
                        <input type="password" class="form-control" name="new_password2" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-primary">Изменить</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}

{% extends 'base.html' %}

{% block title %}Панель администратора{% endblock %}

{% block main %}
<div class="container mt-4">
    <h2 class="mb-4">Панель администратора</h2>

    <div class="row g-3">
        <div class="col-md-4">
            <a href="/admin/users" class="text-decoration-none">
                <div class="card h-100 border-primary">
                    <div class="card-body text-center py-4">
                        <i class="bi bi-people fs-1 text-primary"></i>
                        <h5 class="card-title mt-3">Пользователи</h5>
                        <p class="card-text text-muted">Управление пользователями, изменение имён и статусов</p>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/admin/messages" class="text-decoration-none">
                <div class="card h-100 border-success">
                    <div class="card-body text-center py-4">
                        <i class="bi bi-envelope fs-1 text-success"></i>
                        <h5 class="card-title mt-3">Сообщения</h5>
                        <p class="card-text text-muted">Отправка уведомлений одному, нескольким или всем пользователям</p>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>
{% endblock %}
